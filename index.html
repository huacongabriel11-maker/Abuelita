<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Cumpleaños Abuelita</title>
    <style>
        /* --- VARIABLES DE DISEÑO (Arquitectura CSS) --- */
        :root {
            --primary-color: #ff69b4;
            --primary-glow: rgba(255, 105, 180, 0.8);
            --bg-color: #02000a;
            --text-color: #ffd1dc;
        }

        /* --- RESET Y ESTILO BASE --- */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--bg-color); color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; touch-action: manipulation; 
        }

        /* --- CAPA 3D (CANVAS) --- */
        #canvas-container { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 1; 
        }
        
        /* --- PANTALLAS DE INTERFAZ --- */
        .screen { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 3; 
            text-align: center; width: 90%; max-width: 500px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        #main-content { display: none; opacity: 0; pointer-events: none; }
        #main-content.active { pointer-events: auto; }

        /* --- TIPOGRAFÍA Y MENSAJES --- */
        h1.intro-title { 
            font-size: clamp(2.5rem, 10vw, 4rem); 
            text-shadow: 0 0 20px var(--primary-color), 0 0 40px #ff1493; 
            margin-bottom: 20px; animation: glow 2s infinite alternate; 
        }

        .message-text {
            background: rgba(0, 0, 0, 0.5); 
            padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255, 105, 180, 0.3);
            backdrop-filter: blur(8px);
            margin-bottom: 25px; min-height: 150px;
        }

        #typed-message { 
            font-size: 1.1rem; line-height: 1.6; color: var(--text-color);
            text-align: left;
        }

        /* --- FOTO Y DECORACIÓN --- */
        .foto-abuelita {
            width: 150px; height: 150px; object-fit: cover;
            border-radius: 50%; border: 4px solid var(--primary-color);
            box-shadow: 0 0 30px var(--primary-glow);
            margin-bottom: 20px; animation: pulse-shadow 3s infinite;
        }

        button { 
            background: rgba(255, 105, 180, 0.2); border: 2px solid var(--primary-color);
            color: var(--primary-color); padding: 15px 40px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover { background: var(--primary-color); color: white; }

        /* --- ANIMACIONES --- */
        @keyframes glow { from { text-shadow: 0 0 10px var(--primary-color); } to { text-shadow: 0 0 30px #ff00ff; } }
        @keyframes pulse-shadow { 0%, 100% { box-shadow: 0 0 15px var(--primary-glow); } 50% { box-shadow: 0 0 35px var(--primary-glow); } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="intro-screen" class="screen">
        <h1 class="intro-title">¡FELIZ<br>CUMPLEAÑOS!</h1>
        <button id="btn-entrar" class="pulse-btn">Entrar a tu sorpresa ✨</button>
    </div>

    <div id="main-content" class="screen">
        <img src="IMG-20260621-WA0010.jpg" alt="Abuelita" class="foto-abuelita">
        <div class="message-text">
            <div id="typed-message"></div>
        </div>
        <button id="btn-final">Ver Galaxia 🌌</button>
    </div>

    <audio id="musica-fondo" loop playsinline>
        <source src="cancion.mp4" type="audio/mp4">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        /* --- LÓGICA DE ESCRITURA (Efecto Typewriter) --- */
        const mensajeCompleto = "Abuelita hermosa, vivir contigo cada día es un regalo. Gracias por enseñarme tanto, por cuidarme y por ser mi guía. En esta galaxia inmensa, tú eres la estrella que más brilla. ¡Te amo con todo mi corazón!";
        
        async function escribirMensaje() {
            const contenedor = document.getElementById('typed-message');
            for (let letra of mensajeCompleto) {
                contenedor.innerHTML += letra;
                await new Promise(r => setTimeout(r, 40)); // Velocidad de escritura
            }
        }

        /* --- LÓGICA DE NAVEGACIÓN Y AUDIO --- */
        const btnEntrar = document.getElementById('btn-entrar');
        const introScreen = document.getElementById('intro-screen');
        const mainContent = document.getElementById('main-content');
        const musica = document.getElementById('musica-fondo');

        btnEntrar.addEventListener('click', () => {
            // Iniciar Audio
            musica.play().catch(e => console.log("Audio esperando interacción"));
            
            // Animación pantalla
            introScreen.style.opacity = '0';
            setTimeout(() => {
                introScreen.style.display = 'none';
                mainContent.style.display = 'flex';
                requestAnimationFrame(() => {
                    mainContent.style.opacity = '1';
                    mainContent.classList.add('active');
                    escribirMensaje(); // Iniciar efecto escritura
                });
            }, 800);
        });

        /* --- LÓGICA DE ANIMACIÓN 3D (Simplificada para fluidez) --- */
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Geometría
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for(let i = 0; i < 3000; i++) {
            vertices.push((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0xff69b4, size: 0.05 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
